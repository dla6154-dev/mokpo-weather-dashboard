services:
  - type: web
    name: mokpo-weather-dashboard
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-server.txt
    startCommand: uvicorn weather_dashboard.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DASHBOARD_TIMEZONE
        value: Asia/Seoul
      - key: KMA_COMMENTARY_STATION_ID
        value: "156"
      - key: DASHBOARD_REFRESH_SECONDS
        value: "300"
      - key: DASHBOARD_CLIENT_REFRESH_SECONDS
        value: "30"
      - key: DASHBOARD_REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: KMA_AUTH_KEY
        sync: false
      - key: KMA_PUB_AUTH_KEY
        sync: false
      - key: TIDE_SERVICE_KEY
        sync: false
      - key: MARINE_SERVICE_KEY_JSON
        sync: false
