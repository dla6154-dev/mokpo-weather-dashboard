<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>조석표 표형 미리보기</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260508b">
  </head>
  <body>
    <main class="page-shell">
      <nav class="page-nav" aria-label="화면 전환">
        <a href="/query1" class="nav-link">기상정보</a>
        <a href="/area-warnings" class="nav-link">해역별 기상특보</a>
        <a href="/tides" class="nav-link">조석표</a>
        <a href="/overview" class="nav-link">기상종합</a>
        <a href="/tide-layout-preview" class="nav-link">조석 시안</a>
        <a href="/tide-table-preview" class="nav-link current">조석 표형</a>
        <a href="/settings" class="nav-link">설정</a>
      </nav>

      <header class="page-header">
        <div>
          <p class="eyebrow">Overview Tide Table Preview</p>
          <h1>조석표 표형 미리보기</h1>
          <p class="subtitle">기상종합 하단 조석표를 지점별 표로 바꿨을 때의 2열 배치 미리보기입니다.</p>
        </div>
        <div class="meta-panel">
          <div class="meta-item">
            <span class="meta-label">배치</span>
            <strong>목포 / 계마 · 서망 / 옥도 · 향화 / 암태</strong>
          </div>
          <div class="meta-item">
            <span class="meta-label">API 시각</span>
            <strong id="tide-table-preview-generated-at">-</strong>
          </div>
        </div>
      </header>

      <section class="table-card tide-table-preview-card">
        <div class="table-card-header">
          <div>
            <h2>지점별 표형 조석표</h2>
            <p id="tide-table-preview-note">실데이터 없는 지점은 빈 카드로 표시합니다.</p>
          </div>
        </div>
        <div id="tide-table-preview-grid" class="tide-table-preview-grid"></div>
      </section>
    </main>

    <script>
      window.__INITIAL_TIDE_SNAPSHOT__ = {{ snapshot_json | safe }};
      window.__CLIENT_REFRESH_SECONDS__ = {{ client_refresh_seconds }};
    </script>
    <script src="/static/tide_table_preview.js?v=20260508b"></script>
  </body>
</html>
